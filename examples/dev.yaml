# Application Configuration
server:
  host: "0.0.0.0"                  # Server host address
  port: 8080                       # Server port (1-65535)
  mode: "dev"                      # Environment: dev, staging, prod
  timeout: "30s"                   # Request timeout duration

database:
  driver: "postgres"               # Database driver: postgres, mysql, sqlite
  host: "localhost"                # Database host
  port: 5432                       # Database port
  database: "myapp"                # Database name
  username: "postgres"             # Database username
  password: "password"             # Database password
  max_conns: 20                    # Maximum connections (1-100)

cache:
  enabled: false                   # Enable/disable caching
  driver: "redis"                  # Cache driver: redis, memcached
  ttl: 300                         # Cache TTL in seconds (0 for no expiry)

security:
  jwt_secret: "change-this-secret-key-in-production"  # JWT signing secret
  encryption_key: "change-this-encryption-key-too"    # Data encryption key
  cors: true                      # Enable CORS

features:
  enable_metrics: false           # Enable metrics collection
  enable_tracing: false           # Enable distributed tracing
  beta_features: false            # Enable beta/unstable features